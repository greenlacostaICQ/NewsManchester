name: Tests

on:
  push:
    branches-ignore:
      - main  # main runs the daily digest; tests run on branches + PRs.
  pull_request:
  workflow_dispatch:

jobs:
  unittest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install package
        run: pip install -e .

      - name: Run unittest suite (includes editorial regression pack)
        run: python3 -m unittest discover -s tests -v
