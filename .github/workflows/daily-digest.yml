name: Greater Manchester AM Digest

on:
  workflow_dispatch:
    # Triggered by the external scheduler, or manually from GitHub Actions UI.

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e . openai

      - name: Log trigger
        run: echo "Running daily digest via ${{ github.event_name }} at $(TZ=Europe/London date +'%Y-%m-%d %H:%M %Z')"

      - name: Run pipeline — collect → dedupe → validate
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.NEWSBOTKEY }}
          TELEGRAM_TARGET: ${{ secrets.BOTNEWSNAME }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          # I1: dedupe-digest now also runs a semantic pass via OpenAI
          # embeddings. Falls back to deterministic-only when the key is
          # missing — never blocks the release.
          OPENAI_API_KEY: ${{ secrets.OPENAI }}
          FORCE_COLLECT: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: |
          set -euo pipefail
          python3 scripts/run_local_digest.py collect-digest
          python3 scripts/run_local_digest.py dedupe-digest
          python3 scripts/run_local_digest.py validate-candidates

      - name: Curator pass — editorial drop + lead selection
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI }}
          GROQ_API_KEY: ${{ secrets.GROGAPIKEY }}
        run: python3 scripts/run_local_digest.py curator-pass

      - name: Transport fill — deterministic templates + Metrolink reminders
        run: python3 scripts/run_local_digest.py transport-fill

      - name: LLM rewrite — DeepSeek → OpenAI → Groq Llama
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.NEWSBOTKEY }}
          TELEGRAM_TARGET: ${{ secrets.BOTNEWSNAME }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI }}
          GROQ_API_KEY: ${{ secrets.GROGAPIKEY }}
        run: python3 scripts/run_local_digest.py llm-rewrite

      - name: Run pipeline — write → edit → build
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.NEWSBOTKEY }}
          TELEGRAM_TARGET: ${{ secrets.BOTNEWSNAME }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          NEWS_DIGEST_TICKET_NOTABILITY_LOOKUP: "1"
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: |
          set -euo pipefail
          python3 scripts/run_local_digest.py write-digest
          python3 scripts/run_local_digest.py edit-digest
          python3 scripts/run_local_digest.py build-digest

      - name: Send digest to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.NEWSBOTKEY }}
          TELEGRAM_TARGET: ${{ secrets.BOTNEWSNAME }}
          FORCE_FLAG: ${{ github.event_name == 'workflow_dispatch' && '--force' || '' }}
        run: |
          python3 scripts/run_local_digest.py send-file data/outgoing/current_digest.html --parse-mode HTML $FORCE_FLAG

      - name: Post-publish quality judge (S6)
        # Runs AFTER the digest ships so the judge scores exactly what
        # the reader saw. Never blocks: if OPENAI_API_KEY is missing or
        # the LLM call errors, the step prints and exits 0. Drift is
        # written into release_report.json so send-warnings can surface
        # it without rerunning the judge.
        if: always()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI }}
        run: |
          python3 scripts/run_local_digest.py post-publish-judge

      - name: Send internal warnings to Telegram (if any)
        # Always run so a blocked digest (release_decision=fail with
        # unhealthy health) still notifies the chat. Script no-ops when
        # release_report.json is missing.
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.NEWSBOTKEY }}
          TELEGRAM_TARGET: ${{ secrets.BOTNEWSNAME }}
          WARNINGS_TO_TELEGRAM: "1"
        run: |
          python3 scripts/run_local_digest.py send-warnings

      - name: Send weekly cost summary (Sundays only)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.NEWSBOTKEY }}
          TELEGRAM_TARGET: ${{ secrets.BOTNEWSNAME }}
        run: |
          if [ "$(TZ=Europe/London date +%u)" = "7" ]; then
            python3 scripts/run_local_digest.py send-weekly-cost
          else
            echo "Not Sunday in Europe/London — skipping weekly cost summary."
          fi

      - name: Send weekly city rollup (Sundays only)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.NEWSBOTKEY }}
          TELEGRAM_TARGET: ${{ secrets.BOTNEWSNAME }}
        run: |
          if [ "$(TZ=Europe/London date +%u)" = "7" ]; then
            python3 scripts/run_local_digest.py send-weekly-city-rollup
          else
            echo "Not Sunday in Europe/London — skipping weekly city rollup."
          fi

      - name: Dump failure diagnostics
        if: failure()
        run: |
          set +e
          echo "=== GitHub digest failure diagnostics ==="
          echo "event=${{ github.event_name }}"
          echo "sha=${{ github.sha }}"
          echo "london_now=$(TZ=Europe/London date +'%Y-%m-%d %H:%M %Z')"
          for file in \
            data/state/collector_report.json \
            data/state/dedupe_memory.json \
            data/state/candidate_validation_report.json \
            data/state/curator_report.json \
            data/state/writer_report.json \
            data/state/editor_report.json \
            data/state/release_report.json
          do
            echo ""
            echo "=== $file ==="
            if [ -f "$file" ]; then
              python3 -m json.tool "$file" | sed -n '1,220p'
            else
              echo "missing"
            fi
          done
          echo ""
          echo "=== data/state/draft_digest.html preview ==="
          if [ -f data/state/draft_digest.html ]; then
            sed -n '1,120p' data/state/draft_digest.html
          else
            echo "missing"
          fi

      - name: Commit updated state files
        if: always()
        run: |
          git config user.name "digest-bot"
          git config user.email "digest-bot@users.noreply.github.com"
          git add -f data/state/published_facts.json || true
          git add -f data/state/dedupe_memory.json || true
          git add -f data/state/collector_report.json || true
          git add -f data/state/candidates.json || true
          git add -f data/state/candidate_validation_report.json || true
          git add -f data/state/curator_report.json || true
          git add -f data/state/writer_report.json || true
          git add -f data/state/editor_report.json || true
          git add -f data/state/release_report.json || true
          # HTTP-validator cache. Persisting it between runs is what
          # makes If-None-Match send a real value on day N+1.
          git add -f data/state/fetch_cache.json || true
          git add -f data/state/cost_history.json || true
          git add -f data/state/city_intelligence_history.json || true
          git add -f data/state/quality_scorecard_history.json || true
          git add -f data/state/personalization_feedback.json || true
          git add -f data/state/weekly_city_rollup.json || true
          git add -f data/state/daily_index/*.jsonl || true
          git add -f data/state/backup_pool.json || true
          git add -f data/state/audit_trail/*.jsonl || true
          git add -f data/state/cost_curator.json || true
          git add -f data/state/cost_llm_rewrite.json || true
          git add -f data/state/llm_rewrite_report.json || true
          git add -f data/state/bot_state.json || true
          git add -f data/state/delivery_state.json || true
          # Metrolink reminders need cross-day persistence so an active
          # disruption appears every morning until end_date passes.
          git add -f data/state/active_tram_disruptions.json || true
          git add -f data/state/transport_fill_report.json || true
          # I1: cross-day embedding cache. Persisting it across runs is
          # the whole point — yesterday's vectors are reused without a
          # new API call, so the daily semantic-dedup cost stays at the
          # marginal "today's new candidates" only.
          git add -f data/state/embedding_cache.json || true
          # S6: post-publish judge eval history. Persistent across days
          # so drift detection has a 30-day baseline to compare against.
          git add -f data/state/digest_evals.jsonl || true
          # Phase 2 #2/#4: per-run source health log. Persistent across days
          # so the anomaly check has a trailing window to compare against.
          git add -f data/state/source_health_history.jsonl || true
          git add -f data/outgoing/current_digest.html || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: digest state $(date -u '+%Y-%m-%d')"
            git pull --rebase origin main
            git push
          fi
