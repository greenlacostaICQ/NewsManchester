name: GM Night Inventory

# Backlog 8.4 on the REAL prod substrate: cron-job.org is the London-time
# scheduler, GitHub Actions is the executor. Each night wave collects ONLY into
# data/state/inventory/*.jsonl and commits it back to the repo, so the 08:00
# morning run (which checks out main) can read it. A wave never writes
# candidates.json, so it can't block/corrupt the morning release. The morning
# build consumes only fact-ready stable cards and keeps ordinary live collection
# for every category the latest healthy night wave did not fully replace.
# Primary dispatch schedule is owned by cron-job.org in Europe/London:
# 00:31 events, 02:07 tickets, 03:37 pro_food_russian, 06:17 live_news,
# 07:31 breaking. GitHub's two UTC schedules provide only an idempotent Events
# fallback at 00:41 London; the inactive GMT/BST slot and an already-complete
# external Events run both skip before collection.

on:
  schedule:
    - cron: '41 23 * * *'  # 00:41 Europe/London during BST
    - cron: '41 0 * * *'   # 00:41 Europe/London during GMT
  workflow_dispatch:
    inputs:
      wave:
        description: 'Wave to collect'
        required: true
        type: choice
        options:
          - events
          - tickets
          - pro_food_russian
          - live_news
          - breaking
      mode:
        description: 'force = always collect; fallback = skip when today is already complete'
        required: true
        default: force
        type: choice
        options:
          - force
          - fallback

permissions:
  contents: write

# Serialize with the morning digest (same group) so a late 'breaking' wave and
# the 08:00 build never race on the state commit; the morning run queues behind
# it rather than being cancelled.
concurrency:
  group: digest-state
  cancel-in-progress: false

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e . openai

      - name: Resolve wave from dispatch input
        id: wave
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          DISPATCH_WAVE: ${{ github.event.inputs.wave }}
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
        run: |
          set -euo pipefail
          WAVE="$DISPATCH_WAVE"
          MODE="${DISPATCH_MODE:-force}"
          if [ "$EVENT_NAME" = "schedule" ]; then
            WAVE="events"
            MODE="fallback"
            expected_schedule=$(python3 - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          offset = int((datetime.now(ZoneInfo("Europe/London")).utcoffset() or 0).total_seconds())
          print("41 23 * * *" if offset == 3600 else "41 0 * * *")
          PY
            )
            if [ "$EVENT_SCHEDULE" != "$expected_schedule" ]; then
              echo "wave=$WAVE" >> "$GITHUB_OUTPUT"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Inactive GMT/BST fallback slot: $EVENT_SCHEDULE (active: $expected_schedule)."
              exit 0
            fi
          fi
          if [ -z "$WAVE" ]; then echo "No wave resolved" >&2; exit 1; fi
          echo "wave=$WAVE" >> "$GITHUB_OUTPUT"
          if [ "$MODE" = "fallback" ] && python3 scripts/run_local_digest.py inventory-wave-complete --wave "$WAVE"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "A complete $WAVE wave already exists for today's London date; fallback skipped."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Resolved wave: $WAVE"

      - name: Collect inventory wave
        if: steps.wave.outputs.skip != 'true'
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          SKIDDLE_API_KEY: ${{ secrets.SKIDDLE_APIKEY }}
          NRE_USERNAME: ${{ secrets.NRE_USERNAME }}
          NRE_PASSWORD: ${{ secrets.NRE_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI }}
        run: |
          set -euo pipefail
          python3 scripts/run_local_digest.py collect-inventory --wave "${{ steps.wave.outputs.wave }}" | tee /tmp/inventory_summary.json

      - name: Commit inventory to repo
        if: ${{ always() && steps.wave.outputs.skip != 'true' }}
        run: |
          set -uo pipefail
          git config user.name "digest-bot"
          git config user.email "digest-bot@users.noreply.github.com"
          git add -f data/state/inventory/*.jsonl || true
          git add -f data/state/inventory_run_log.jsonl || true
          if git diff --staged --quiet; then
            echo "No inventory changes to commit."
            exit 0
          fi
          git commit -m "chore: night inventory ${{ steps.wave.outputs.wave }} $(TZ=Europe/London date '+%Y-%m-%d %H:%M')"
          # A concurrent wave (or the morning build) can advance the dispatched
          # branch between checkout and push. On production GITHUB_REF_NAME is
          # main; acceptance runs must stay on their own branch instead of
          # rebasing the whole feature branch onto main.
          target_branch="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash origin "$target_branch" && \
               git push origin "HEAD:$target_branch"; then
              echo "Pushed inventory on attempt ${attempt}."
              exit 0
            fi
            echo "Push race on attempt ${attempt} — re-syncing and retrying."
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "Could not push inventory after 5 attempts." >&2
          exit 1

      - name: Notify Telegram — wave complete
        if: ${{ success() && steps.wave.outputs.skip != 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.NEWSBOTKEY }}
          TELEGRAM_TARGET: ${{ secrets.BOTNEWSNAME }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.parse, urllib.request

          try:
              with open("/tmp/inventory_summary.json", encoding="utf-8") as fh:
                  summary = json.load(fh)
          except Exception:
              summary = {}

          wave = summary.get("wave", "?")
          polled = summary.get("sources_polled", 0)
          found = int(summary.get("found_this_run", 0) or 0)
          ready = int(summary.get("morning_eligible_this_run", 0) or 0)
          errors = int(summary.get("source_errors", 0) or 0)
          health = summary.get("health", "unknown")
          dur = summary.get("duration_seconds", 0)
          text = (
              f"🌙 Инвентарь · волна {wave}\n"
              f"источников опрошено: {polled}\n"
              f"найдено в этом прогоне: {found}\n"
              f"готово к выпуску: {ready}\n"
              f"ошибок источников: {errors}\n"
              f"статус: {health}\n"
              f"время: {dur}s"
          )

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          target = os.environ.get("TELEGRAM_TARGET", "")
          if not token or not target:
              print("No Telegram token/target — skipping notify.")
          else:
              data = urllib.parse.urlencode({"chat_id": target, "text": text}).encode()
              req = urllib.request.Request(f"https://api.telegram.org/bot{token}/sendMessage", data=data)
              with urllib.request.urlopen(req, timeout=20) as resp:
                  print("Telegram notify status:", resp.status)
          PY

      - name: Notify Telegram — wave failed
        if: ${{ failure() && steps.wave.outputs.skip != 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.NEWSBOTKEY }}
          TELEGRAM_TARGET: ${{ secrets.BOTNEWSNAME }}
        run: |
          python3 - <<'PY'
          import os, urllib.parse, urllib.request
          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          target = os.environ.get("TELEGRAM_TARGET", "")
          text = "❌ Инвентарь: ночная волна упала — см. GitHub Actions лог."
          if token and target:
              data = urllib.parse.urlencode({"chat_id": target, "text": text}).encode()
              req = urllib.request.Request(f"https://api.telegram.org/bot{token}/sendMessage", data=data)
              try:
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      print("Telegram notify status:", resp.status)
              except Exception as exc:
                  print("Telegram notify failed:", exc)
          PY
